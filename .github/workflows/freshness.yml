name: Freshness check

# Run daily at 14:00 UTC (6am Pacific) and on demand from the Actions tab.
# Also runs on every push to main so a bad commit gets flagged immediately.
on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '*.html'
      - 'tools/freshness-check.py'

permissions:
  issues: write
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run freshness check (local files)
        id: lint
        # Pipe to a file so we can attach it to an issue if it fails.
        run: |
          set +e
          python3 tools/freshness-check.py | tee freshness-report.txt
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Open or update issue with findings
        if: steps.lint.outputs.exit != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('freshness-report.txt', 'utf8');
            const title = '🚨 Freshness check: stale content on the site';
            const body = [
              'The daily freshness lint flagged stale content on the live site.',
              '',
              'Run locally with:',
              '```',
              'python3 tools/freshness-check.py',
              '```',
              '',
              '## Report',
              '```',
              report,
              '```',
              '',
              `_Generated by .github/workflows/freshness.yml at ${new Date().toISOString()}._`,
            ].join('\n');

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'freshness', per_page: 1,
            });

            if (existing.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing[0].number,
                body, title,
              });
              core.notice(`Updated issue #${existing[0].number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['freshness'],
              });
              core.notice(`Opened issue #${created.number}`);
            }

      - name: Close stale issue when clean
        if: steps.lint.outputs.exit == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'freshness', per_page: 5,
            });
            for (const issue of existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: 'Freshness check is clean — closing.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, state: 'closed',
              });
              core.notice(`Closed issue #${issue.number}`);
            }

      - name: Fail workflow if issues found
        if: steps.lint.outputs.exit != '0'
        run: |
          echo "::error::Freshness check found stale content (see report above)"
          exit 1
